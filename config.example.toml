# Copy to ~/.ask-up/config.toml (or $ASK_UP_HOME/config.toml) and edit.
# Every key is optional; omitted keys fall back to the defaults shown here.
# ask-up wraps the local Claude Code CLI, so there are no API keys here.

model      = "opus"     # Claude Code model alias or id (e.g. "opus", "claude-opus-4-8")
effort     = "xhigh"    # reasoning effort: low | medium | high | xhigh | max
claude_bin = "claude"   # path to the real claude binary; set absolute if a shell alias/wrapper shadows it
config_dir = ""         # CLAUDE_CONFIG_DIR for the advisor (which account); empty = inherit the active profile

# Override the advisor system prompt:
# system = "You are a senior advisor being consulted by another Claude agent..."
