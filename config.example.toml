# Copy to ~/.ask-up/config.toml (or $ASK_UP_HOME/config.toml) and edit.
# Every key is optional; omitted keys fall back to the defaults shown here.

model         = "claude-opus-4-8"  # the "up" model to escalate to
effort        = "high"             # low | medium | high | xhigh | max
ttl           = "5m"               # cache breakpoint TTL: "5m" or "1h"
warmth_window = ""                 # duration override (e.g. "90s"); default is ttl minus 10s
base_url      = ""                 # optional enterprise gateway base URL
max_tokens    = 8192               # response token cap

# Override the consult instruction sent to the upstream model:
# system = "You are a senior engineer being consulted by another agent..."
